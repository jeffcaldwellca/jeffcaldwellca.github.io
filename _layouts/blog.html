<!DOCTYPE html>
<html lang="en">
  {% include header.html %}
  <body>
    <main class="container blog-container">
      <h1 class="my-4">{{ page.heading | default: page.title | remove: "jeffcaldwell.ca // " }}</h1>
      <p><a href="{{ 'blog' | relative_url }}" class="text-danger" aria-label="Back to blog">&lt; back</a></p>
      <div class="row align-items-start">
        <div class="col-12 col-md-8">
          <p class="text-muted"><time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %d, %Y" }}</time></p>
          <div class="blog-content">{{ content }}</div>
        </div>
        <div class="col-12 col-md-4 sidebar-col">
          <div class="sidebar-sticky">
            <img src="{{ page.image | default: 'assets/img/me.jpg' | relative_url }}" class="img-fluid img-thumbnail sidebar-img" alt="{% if page.image %}{{ page.title }}{% else %}Jeff Caldwell{% endif %}" width="400" height="400" fetchpriority="high">
            <div class="mt-3">
              {% include nav.html %}
            </div>
          </div>
        </div>
      </div>
    </main>
    {% include footer.html %}
  </body>
</html>
