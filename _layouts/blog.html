<!DOCTYPE html>
<html lang="en">
  {% include header.html %}
  <body>
    <div class="container blog-container">
      <h1 class="my-4">{{ page.title }}</h1>
      <p><a href="{{ 'blog' | relative_url }}" class="text-danger">&lt; back</a></p>
      <div class="row align-items-start">
        <div class="col-12 col-md-8">
          <p class="text-muted">{{ page.date | date: "%B %d, %Y" }}</p>
          <div class="blog-content">{{ content }}</div>
        </div>
        <div class="col-12 col-md-4 sidebar-col">
          <div class="sidebar-sticky">
            <img src="{{ page.image | default: 'assets/img/me.jpg' | relative_url }}" class="img-fluid img-thumbnail sidebar-img" alt="{{ page.title }}">
            <div class="mt-3">
              {% include nav.html %}
            </div>
          </div>
        </div>
      </div>
    </div>
    {% include footer.html %}
  </body>
</html>
