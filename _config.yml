title: jeffcaldwell.ca
url: "https://www.jeffcaldwell.ca"
description: "Software Developer and Professor of Business and Information Technology"

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - docs

collections:
  blogs:
    output: true  # Generates individual blog post pages
    permalink: /blog/:name/
    sort_by: date
  projects:
    output: true  # Generates individual project info card pages
    permalink: /projects/:name/

defaults:
  # Project card pages are WIP: reachable by direct URL, kept out of search
  # results. Drop this block (and unhide .info-link) when they're ready.
  - scope:
      type: projects
    values:
      noindex: true
