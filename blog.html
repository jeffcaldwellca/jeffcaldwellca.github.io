---
layout: default
title: "jeffcaldwell.ca // blog"
description: "sometimes i write things."
permalink: /blog/
---
<div class="row mt-3">

  <div class="col-12 col-md-8 order-2 order-md-1">
    <p><a href="/" class="text-danger" aria-label="Back to home">&lt; back</a></p>
    <p class="text-muted">Sometimes I write things.</p>
    <ul class="list-unstyled">
      {% for blog in site.blogs reversed %}
        <li class="mb-2">
          <span class="text-muted small me-3">{{ blog.date | date: "%Y-%m-%d" }}</span><a href="{{ blog.url | relative_url }}" class="fw-bold text-danger">{{ blog.title }}</a>
        </li>
      {% endfor %}
    </ul>
  </div>
  <div class="col-12 col-md-4 order-1 order-md-2 sidebar-col">
    <div class="sidebar-sticky">
      <img src="{{ 'assets/img/me.jpg' | relative_url }}" class="img-fluid img-thumbnail sidebar-img" alt="Jeff Caldwell" width="400" height="400" fetchpriority="high">
      <div class="mt-3">
        {% include nav.html %}
      </div>
    </div>
  </div>
</div>
