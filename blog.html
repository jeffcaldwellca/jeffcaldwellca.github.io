---
layout: default
title: "jeffcaldwell.ca // blog"
permalink: /blog/
---
<div class="row mt-3">
  
  <div class="col-12 col-md-8 order-2 order-md-1">
    <p><a href="/" class="text-danger">&lt; back</a></p>
    <p class="text-muted">Sometimes I write things.</p>
    <ul class="list-group list-group-flush">
      {% for blog in site.blogs reversed %}
        <li class="list-group-item d-flex justify-content-between align-items-center">
          <a href="{{ blog.url | relative_url }}" class="text-decoration-none fw-bold text-danger">
            {{ blog.title }}
          </a>
          <span class="text-muted small">{{ blog.date | date: "%Y%m%d" }}</span>
        </li>
      {% endfor %}
    </ul>
  </div>
  <div class="col-12 col-md-4 order-1 order-md-2 sidebar-col">
    <div class="row">
      <img src="{{ 'assets/img/me.jpg' | relative_url }}" class="img-fluid img-thumbnail" alt="Jeff Caldwell">
    </div>
    <div class="row mt-3">
      {% include nav.html %}
    </div>
  </div>
</div>
